name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run tests
        run: npm test -- --bail=1
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          API_KEY: ${{ secrets.API_KEY_STAGING }}
      - name: Apply migrations to staging
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
      - name: Deploy to staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging
      - name: Set staging secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.DATABASE_URL_STAGING }}" | npx wrangler secret put DATABASE_URL --env staging
          echo "${{ secrets.API_KEY_STAGING }}" | npx wrangler secret put API_KEY --env staging
      - name: Semantic release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Apply migrations to production
        run: npm run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
      - name: Deploy to production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env production
      - name: Set production secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          echo "${{ secrets.DATABASE_URL_PRODUCTION }}" | npx wrangler secret put DATABASE_URL --env production
          echo "${{ secrets.API_KEY_PRODUCTION }}" | npx wrangler secret put API_KEY --env production
