name = "sol-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[dev]
ip = "0.0.0.0"
port = 8787

[vars]
ENVIRONMENT = "development"
# SANITY_API_TOKEN and GITHUB_TOKEN are Cloudflare Secrets — not set here

[env.staging]
name = "sol-api-staging"

[env.staging.vars]
ENVIRONMENT = "staging"

[env.production]
name = "sol-api"

[env.production.vars]
ENVIRONMENT = "production"
